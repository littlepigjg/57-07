<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简谱编辑器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>简谱编辑器</h1>
            <div class="toolbar">
                <div class="tool-group">
                    <label>音调：</label>
                    <select id="keySelect">
                        <option value="C">C调</option>
                        <option value="D">D调</option>
                        <option value="E">E调</option>
                        <option value="F">F调</option>
                        <option value="G" selected>G调</option>
                        <option value="A">A调</option>
                        <option value="B">B调</option>
                    </select>
                </div>
                <div class="tool-group">
                    <label>拍号：</label>
                    <select id="timeSignature">
                        <option value="2/4">2/4</option>
                        <option value="3/4">3/4</option>
                        <option value="4/4" selected>4/4</option>
                        <option value="6/8">6/8</option>
                    </select>
                </div>
                <div class="tool-group">
                    <label>速度：</label>
                    <input type="number" id="tempoInput" value="120" min="40" max="240" style="width: 60px;">
                    <span>BPM</span>
                </div>
            </div>
        </header>

        <div class="main-content">
            <aside class="left-panel">
                <h3>音符工具</h3>
                <div class="note-tools">
                    <div class="tool-row">
                        <span class="tool-label">音高：</span>
                        <div class="note-buttons">
                            <button class="note-btn" data-pitch="1">1</button>
                            <button class="note-btn" data-pitch="2">2</button>
                            <button class="note-btn" data-pitch="3">3</button>
                            <button class="note-btn" data-pitch="4">4</button>
                            <button class="note-btn" data-pitch="5">5</button>
                            <button class="note-btn" data-pitch="6">6</button>
                            <button class="note-btn" data-pitch="7">7</button>
                        </div>
                    </div>
                    <div class="tool-row">
                        <span class="tool-label">八度：</span>
                        <div class="octave-buttons">
                            <button class="octave-btn active" data-octave="-1">低音</button>
                            <button class="octave-btn active" data-octave="0">中音</button>
                            <button class="octave-btn" data-octave="1">高音</button>
                        </div>
                    </div>
                    <div class="tool-row">
                        <span class="tool-label">时值：</span>
                        <div class="duration-buttons">
                            <button class="duration-btn" data-duration="4">全音符</button>
                            <button class="duration-btn" data-duration="2">二分音符</button>
                            <button class="duration-btn active" data-duration="1">四分音符</button>
                            <button class="duration-btn" data-duration="0.5">八分音符</button>
                            <button class="duration-btn" data-duration="0.25">十六分音符</button>
                        </div>
                    </div>
                    <div class="tool-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="dottedCheck"> 附点
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="tieCheck"> 连音线
                        </label>
                    </div>
                    <div class="tool-row">
                        <button id="addBarLineBtn" class="action-btn">添加小节线</button>
                        <button id="addRestBtn" class="action-btn">添加休止符</button>
                        <button id="deleteBtn" class="action-btn danger">删除选中</button>
                        <button id="clearBtn" class="action-btn danger">清空乐谱</button>
                    </div>
                </div>

                <h3 style="margin-top: 20px;">和弦工具</h3>
                <div class="chord-tools">
                    <div class="tool-row">
                        <label class="checkbox-label" style="margin-right: 10px;">
                            <input type="checkbox" id="chordModeCheck"> 和弦模式
                        </label>
                        <button id="addCustomChordBtn" class="action-btn" style="min-width: auto; padding: 4px 10px;">自定义</button>
                    </div>
                    <div class="tool-row">
                        <span class="tool-label">常用：</span>
                        <div class="chord-buttons" id="commonChordButtons">
                        </div>
                    </div>
                    <div class="tool-row" id="customChordRow" style="display: none;">
                        <span class="tool-label">和弦：</span>
                        <input type="text" id="customChordInput" placeholder="如: C, Am, G7" style="flex: 1; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;">
                        <button id="confirmCustomChordBtn" class="action-btn" style="min-width: auto; padding: 4px 10px;">确定</button>
                    </div>
                    <div class="tool-row">
                        <span class="tool-label">根音：</span>
                        <div class="chord-root-buttons" id="chordRootButtons">
                        </div>
                    </div>
                    <div class="tool-row">
                        <span class="tool-label">类型：</span>
                        <select id="chordTypeSelect" style="flex: 1; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;">
                            <option value="">大三</option>
                            <option value="m">小三</option>
                            <option value="7">属七</option>
                            <option value="maj7">大七</option>
                            <option value="m7">小七</option>
                            <option value="dim">减三</option>
                            <option value="aug">增三</option>
                            <option value="sus4">挂四</option>
                            <option value="sus2">挂二</option>
                            <option value="6">六</option>
                            <option value="m6">小六</option>
                            <option value="9">九</option>
                            <option value="power">强力五</option>
                        </select>
                    </div>
                    <div class="tool-row">
                        <button id="addChordBtn" class="action-btn">添加和弦</button>
                        <button id="deleteChordBtn" class="action-btn danger">删除和弦</button>
                    </div>
                </div>

                <h3 style="margin-top: 20px;">和弦库</h3>
                <div class="chord-library-controls">
                    <div class="tool-row">
                        <button id="openChordLibraryBtn" class="action-btn" style="flex: 1;">管理和弦库</button>
                    </div>
                </div>

                <h3 style="margin-top: 20px;">播放控制</h3>
                <div class="playback-controls">
                    <button id="playBtn" class="play-btn">▶ 播放</button>
                    <button id="pauseBtn" class="play-btn">⏸ 暂停</button>
                    <button id="stopBtn" class="play-btn">⏹ 停止</button>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <span id="timeDisplay">0:00 / 0:00</span>
                </div>

                <h3 style="margin-top: 20px;">导出</h3>
                <div class="export-controls">
                    <button id="exportImageBtn" class="export-btn">导出图片</button>
                    <button id="exportMidiBtn" class="export-btn">导出MIDI</button>
                </div>
            </aside>

            <main class="center-panel">
                <div class="score-container" id="scoreContainer">
                    <canvas id="scoreCanvas"></canvas>
                </div>
            </main>

            <aside class="right-panel">
                <h3>操作说明</h3>
                <ul class="instructions">
                    <li>点击谱面空白处添加当前工具选择的音符</li>
                    <li>点击已有的音符可以选中进行编辑或删除</li>
                    <li>选中音符后按Delete键可删除</li>
                    <li>拖动音符可改变位置</li>
                    <li>点击小节线可调整位置</li>
                    <li>开启和弦模式后点击谱面添加和弦</li>
                    <li>和弦会跟随下方的音符一起移动</li>
                    <li>改变调号时和弦会自动转调</li>
                </ul>
                <h3 style="margin-top: 20px;">和弦列表</h3>
                <div id="chordList" class="chord-list"></div>
                <h3 style="margin-top: 20px;">音符列表</h3>
                <div id="noteList" class="note-list"></div>
            </aside>
        </div>
    </div>

    <script src="js/utils/NoteUtils.js"></script>
    <script src="js/utils/MidiUtils.js"></script>
    <script src="js/utils/ChordUtils.js"></script>
    <script src="js/models/Note.js"></script>
    <script src="js/models/BarLine.js"></script>
    <script src="js/models/Chord.js"></script>
    <script src="js/ScoreRenderer.js"></script>
    <script src="js/NoteEditor.js"></script>
    <script src="js/AudioSynthesizer.js"></script>
    <script src="js/PlaybackController.js"></script>
    <script src="js/MidiExporter.js"></script>
    <script src="js/ImageExporter.js"></script>
    <div id="chordLibraryModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>和弦库管理</h2>
                <button class="modal-close" id="closeChordLibraryBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="chord-library-toolbar">
                    <button id="addNewChordBtn" class="action-btn">+ 新建和弦</button>
                    <button id="resetChordLibraryBtn" class="action-btn danger">恢复默认</button>
                </div>
                <div class="chord-library-grid" id="chordLibraryGrid">
                </div>
            </div>
        </div>
    </div>

    <div id="chordEditorModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="chordEditorTitle">编辑和弦</h2>
                <button class="modal-close" id="closeChordEditorBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="chord-editor-form">
                    <div class="form-row">
                        <label>和弦名称：</label>
                        <input type="text" id="chordEditorName" placeholder="如: C, Am, G7">
                    </div>
                    <div class="form-row">
                        <label>显示名称：</label>
                        <input type="text" id="chordEditorDisplay" placeholder="如: C, Am, G7">
                    </div>
                    <div class="form-row">
                        <label>描述：</label>
                        <input type="text" id="chordEditorDescription" placeholder="如: C大三和弦">
                    </div>
                    <div class="form-row">
                        <label>吉他指法：</label>
                        <div class="fingering-inputs" id="fingeringInputs">
                        </div>
                    </div>
                    <div class="form-row">
                        <label>起始品位：</label>
                        <input type="number" id="chordEditorStartFret" value="1" min="1" max="20">
                    </div>
                    <div class="form-row">
                        <label>指法预览：</label>
                        <canvas id="fingeringPreviewCanvas" width="120" height="150"></canvas>
                    </div>
                </div>
                <div class="form-actions">
                    <button id="saveChordBtn" class="action-btn">保存</button>
                    <button id="cancelChordBtn" class="action-btn danger">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
